version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: anticorrupcao
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-anticorrupcao123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d anticorrupcao"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-anticorrupcao123}@db:5432/anticorrupcao
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  scheduler:
    build: .
    restart: always
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-anticorrupcao123}@db:5432/anticorrupcao
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    command: python scheduler.py

volumes:
  pgdata:
